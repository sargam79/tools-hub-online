<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Website</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(120deg, #1e3c72, #2a5298);
      color: white;
      text-align: center;
    }

    header {
      padding: 60px 20px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      opacity: 0.9;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background: white;
      color: #1e3c72;
      text-decoration: none;
      border-radius: 25px;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #f1f1f1;
      transform: scale(1.05);
    }

    footer {
      position: absolute;
      bottom: 10px;
      width: 100%;
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <header>
    <h1>Welcome to My Website 🚀</h1>
    <p>This is my GitHub Pages website built with HTML & CSS.</p>

    <a class="btn" href="#">Get Started</a>
  </header>

  <footer>
    © 2026 My Website | All Rights Reserved
  </footer>

</body>
</html>
